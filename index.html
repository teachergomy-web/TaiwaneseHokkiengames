          { text: '文具店' }, { text: '藥局' }, { text: '水果攤' }, { text: '魚攤' }, { text: '豬肉攤' }, 
          { text: '牛肉攤' }, { text: '雞肉攤' }, { text: '麵攤' }, { text: '飲料店' }, { text: '服飾店' }, 
          { text: '五金行' }, { text: '超市' }, { text: '百貨公司' }, { text: '鞋店' }, { text: '眼鏡行' }, 
          { text: '鐘錶行' }, { text: '珠寶店' }, { text: '化妝品店' }, { text: '香水店' }, { text: '玩具店' }, 
          { text: '書店' }, { text: '唱片行' }, { text: '樂器行' }, { text: '體育用品店' }, { text: '腳踏車店' }, 
          { text: '機車行' }, { text: '汽車維修廠' }, { text: '加油站' }, { text: '寵物店' }, { text: '花店' }, 
          { text: '咖啡廳' }, { text: '速食店' }, { text: '牛排館' }, { text: '火鍋店' }, { text: '燒烤店' }, 
          { text: '居酒屋' }, { text: '自助餐店' }, { text: '便當店' }, { text: '冰店' }, { text: '甜點店' }, 
          { text: '烘焙坊' }, { text: '雜貨店' }, { text: '跳蚤市場' }, { text: '農夫市集' }, { text: '黃昏市場' }
        ]
      },
      {
        id: 8, week: 'W8', stage: '對話模擬', title: '猜場景', icon: IconEyeOff, color: 'bg-pink-200',
        rule: '請演出這個場景會出現的對話，讓隊友猜出「地點」！',
        words: [
          { text: '醫院' }, { text: '學校' }, { text: '理髮廳' }, { text: '警察局' }, { text: '捷運站' }, 
          { text: '遊樂園' }, { text: '海邊' }, { text: '動物園' }, { text: '公園' }, { text: '圖書館' }, 
          { text: '銀行' }, { text: '郵局' }, { text: '火車站' }, { text: '機場' }, { text: '電影院' }, 
          { text: '健身房' }, { text: '游泳池' }, { text: '棒球場' }, { text: '籃球場' }, { text: '足球場' }, 
          { text: '網球場' }, { text: '高爾夫球場' }, { text: '溜冰場' }, { text: '滑雪場' }, { text: '露營區' }, 
          { text: '飯店' }, { text: '民宿' }, { text: '青年旅館' }, { text: '博物館' }, { text: '美術館' }, 
          { text: '科學館' }, { text: '天文館' }, { text: '水族館' }, { text: '植物園' }, { text: '國家公園' }, 
          { text: '森林遊樂區' }, { text: '農場' }, { text: '牧場' }, { text: '觀光工廠' }, { text: '廟宇' }, 
          { text: '教堂' }, { text: '郵輪' }, { text: '渡輪站' }, { text: '公車站' }, { text: '高鐵站' }, 
          { text: '停車場' }, { text: '網咖' }, { text: '撞球館' }, { text: '保齡球館' }, { text: 'ＫＴＶ' }
        ]
      }
    ];

    function App() {
      const [selectedWeek, setSelectedWeek] = useState(null);
      const [isGameStarted, setIsGameStarted] = useState(false);
      const [currentWordIndex, setCurrentWordIndex] = useState(0);
      const [shuffledWords, setShuffledWords] = useState([]);
      
      // 計時器狀態
      const [timeLeft, setTimeLeft] = useState(60);
      const [isTimerRunning, setIsTimerRunning] = useState(false);

      // 洗牌函數
      const shuffleArray = (array) => {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
      };

      // 選擇關卡 (顯示規則頁)
      const handleSelectWeek = (weekData) => {
        setSelectedWeek(weekData);
        setIsGameStarted(false); // 確保先顯示規則
      };

      // 開始遊戲
      const startGame = () => {
        setShuffledWords(shuffleArray(selectedWeek.words));
        setCurrentWordIndex(0);
        setTimeLeft(60);
        setIsTimerRunning(false);
        setIsGameStarted(true);
      };

      // 下一題
      const nextWord = () => {
        if (currentWordIndex < shuffledWords.length - 1) {
          setCurrentWordIndex(prev => prev + 1);
        } else {
          // 題庫跑完重新洗牌
          setShuffledWords(shuffleArray(selectedWeek.words));
          setCurrentWordIndex(0);
        }
      };

      // 計時器邏輯
      useEffect(() => {
        let timer;
        if (isTimerRunning && timeLeft > 0) {
          timer = setInterval(() => {
            setTimeLeft((prev) => prev - 1);
          }, 1000);
        } else if (timeLeft === 0) {
          setIsTimerRunning(false);
        }
        return () => clearInterval(timer);
      }, [isTimerRunning, timeLeft]);

      const toggleTimer = () => setIsTimerRunning(!isTimerRunning);
      const resetTimer = () => {
        setIsTimerRunning(false);
        setTimeLeft(60);
      };

      // --- 手繪風 CSS Class 變數 ---
      const boxStyle = "border-4 border-slate-800 rounded-2xl shadow-[6px_6px_0px_0px_rgba(30,41,59,1)] transition-transform";
      const buttonStyle = `active:translate-x-1 active:translate-y-1 active:shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] ${boxStyle}`;

      // ================= 主選單畫面 =================
      if (!selectedWeek) {
        return (
          <div className="min-h-screen bg-yellow-50 p-6 flex flex-col justify-between" style={{ backgroundImage: 'radial-gradient(#cbd5e1 2px, transparent 2px)', backgroundSize: '30px 30px' }}>
            <div className="max-w-4xl mx-auto w-full pt-4 text-slate-800">
              {/* 標題 */}
              <div className={`bg-white p-6 mb-8 text-center rotate-1 ${boxStyle}`}>
                <h1 className="text-4xl md:text-5xl font-black mb-2 text-orange-500 tracking-wide">哩講我猜</h1>
                <p className="text-xl font-bold text-slate-600">全台語挑戰遊戲</p>
              </div>

              {/* 關卡網格 */}
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                {GAME_DATA.map((data, index) => {
                  const Icon = data.icon;
                  return (
                    <button
                      key={data.id}
                      onClick={() => handleSelectWeek(data)}
                      className={`flex flex-col items-center justify-center p-6 ${data.color} ${buttonStyle} hover:-translate-y-1 hover:rotate-2`}
                      style={{ transform: index % 2 === 0 ? 'rotate(-1deg)' : 'rotate(1deg)' }}
                    >
                      <div className="bg-white p-3 rounded-full border-4 border-slate-800 mb-4">
                        <Icon size={32} className="text-slate-800" />
                      </div>
                      <span className="bg-slate-800 text-white font-black px-3 py-1 rounded-full text-sm mb-2">{data.week}</span>
                      <h2 className="text-xl font-black text-center mb-1">{data.stage}</h2>
                      <p className="text-sm font-bold opacity-80">{data.title}</p>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* 版權宣告 */}
            <div className="w-full text-center mt-12 pb-4">
              <p className="text-sm font-bold text-slate-500 tracking-wider">
                © 2026 高米文理補習班 版權所有 (僅供教學使用)
              </p>
            </div>
          </div>
        );
      }

      // ================= 規則說明畫面 (開始前) =================
      if (selectedWeek && !isGameStarted) {
        const Icon = selectedWeek.icon;
        return (
          <div className={`min-h-screen ${selectedWeek.color} p-6 flex flex-col items-center justify-center text-slate-800`} style={{ backgroundImage: 'radial-gradient(rgba(255,255,255,0.4) 2px, transparent 2px)', backgroundSize: '30px 30px' }}>
            <div className={`bg-white w-full max-w-2xl p-10 md:p-14 flex flex-col items-center text-center ${boxStyle}`}>
              
              <div className="bg-slate-100 p-6 rounded-full border-4 border-slate-800 mb-6 transform rotate-3">
                <Icon size={64} className="text-slate-800" />
              </div>
              
              <h2 className="text-4xl font-black mb-2">{selectedWeek.week} : {selectedWeek.stage}</h2>
              <h3 className="text-2xl font-bold text-slate-500 mb-8">【 {selectedWeek.title} 】</h3>
              
              <div className="bg-yellow-100 w-full p-6 rounded-2xl border-4 border-slate-800 mb-10 transform -rotate-1 relative">
                 <div className="absolute -top-5 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-slate-800 font-black px-4 py-1 rounded-full border-2 border-slate-800 flex items-center gap-2">
                    <IconAlertTriangle size={18} /> 遊戲規則
                 </div>
                 <p className="text-xl font-bold text-slate-800 mt-4 leading-relaxed">
                   {selectedWeek.rule}
                 </p>
                 <p className="text-md font-bold text-slate-500 mt-4">
                   ( 共 50 題，題庫會隨機洗牌 )
                 </p>
              </div>

              <button 
                onClick={startGame}
                className={`bg-orange-500 hover:bg-orange-400 text-white text-3xl font-black py-4 px-12 flex justify-center items-center gap-3 w-full sm:w-auto ${buttonStyle}`}
              >
                 開始挑戰 <IconPlay size={32} fill="currentColor" />
              </button>

              <button 
                onClick={() => setSelectedWeek(null)}
                className="mt-8 font-bold text-slate-500 hover:text-slate-800 underline decoration-2 underline-offset-4"
              >
                返回首頁
              </button>
            </div>
          </div>
        );
      }

      // ================= 遊戲主畫面 =================
      const currentWord = shuffledWords[currentWordIndex];

      return (
        <div className={`min-h-screen ${selectedWeek.color} p-4 md:p-8 flex flex-col items-center justify-center text-slate-800`}>
          
          {/* 頂部導覽列 */}
          <div className="w-full max-w-3xl flex justify-between items-center mb-6">
            <button 
              onClick={() => setSelectedWeek(null)}
              className={`bg-white px-4 py-2 flex items-center gap-2 font-bold ${buttonStyle}`}
            >
              <IconHome size={20} /> 回首頁
            </button>

            <div className={`bg-white px-6 py-2 font-black text-lg -rotate-1 ${boxStyle}`}>
              {selectedWeek.week} : {selectedWeek.stage}
            </div>
          </div>

          {/* 主遊戲卡片 */}
          <div className={`bg-white w-full max-w-3xl p-8 md:p-12 flex flex-col items-center relative ${boxStyle}`}>
            
            {/* 題號進度 */}
            <div className="absolute top-4 left-4 bg-yellow-300 font-black px-3 py-1 rounded-full border-2 border-slate-800 transform -rotate-3">
              第 {currentWordIndex + 1} / {shuffledWords.length} 題
            </div>

            {/* 規則提示 */}
            <p className="text-center font-bold text-slate-500 mb-8 mt-6 bg-slate-100 px-4 py-2 rounded-xl border-2 border-dashed border-slate-400">
              📍 規則：{selectedWeek.rule}
            </p>

            {/* 題目顯示 */}
            <h2 className="text-6xl md:text-8xl font-black text-center tracking-widest mb-10 text-slate-800">
              {currentWord?.text}
            </h2>

            {/* 禁詞顯示區 (僅 W5, W6 有) */}
            {currentWord?.taboos && (
              <div className="w-full bg-red-50 border-4 border-red-500 rounded-2xl p-6 mb-8 relative">
                <div className="absolute -top-5 left-1/2 transform -translate-x-1/2 bg-red-500 text-white font-black px-4 py-1 rounded-full border-2 border-slate-800 flex items-center gap-2">
                  <IconAlertTriangle size={16} /> 絕對禁詞
                </div>
                <div className="flex flex-wrap justify-center gap-4 mt-2">
                  {currentWord.taboos.map((taboo, idx) => (
                    <span key={idx} className="text-2xl md:text-3xl font-black text-red-600 bg-white px-4 py-2 rounded-xl border-2 border-red-200 shadow-sm">
                      {taboo}
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* 操作按鈕 */}
            <div className="flex gap-4 mt-4 w-full">
              <button 
                onClick={nextWord}
                className={`flex-1 bg-yellow-400 text-slate-800 text-2xl font-black py-4 flex justify-center items-center gap-2 ${buttonStyle}`}
              >
                 下一題 <IconPlay size={24} fill="currentColor" />
              </button>
            </div>
          </div>

          {/* 底部小工具：計時器 */}
          <div className={`mt-8 bg-white p-4 flex items-center gap-4 ${boxStyle}`}>
            <div className="flex items-center gap-2 text-2xl font-black w-32 justify-center">
              <IconClock size={28} className={isTimerRunning && timeLeft <= 10 ? "text-red-500 animate-pulse" : ""} />
              <span className={timeLeft <= 10 ? "text-red-500" : ""}>
                {timeLeft} 秒
              </span>
            </div>
            <button 
              onClick={toggleTimer}
              className={`bg-blue-400 text-white p-3 rounded-xl border-2 border-slate-800 shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] active:translate-y-1 active:translate-x-1 active:shadow-none font-bold`}
            >
              {isTimerRunning ? '暫停' : '開始計時'}
            </button>
            <button 
              onClick={resetTimer}
              className={`bg-slate-200 text-slate-800 p-3 rounded-xl border-2 border-slate-800 shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] active:translate-y-1 active:translate-x-1 active:shadow-none`}
            >
              <IconRotateCcw size={20} />
            </button>
          </div>

        </div>
      );
    }

    // 渲染應用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
